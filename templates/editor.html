{% extends "base.html" %}
{% block content %}
<h3>Editing job {{ job_key }}</h3>
<div class="mb-3">
    <video width="640" controls>
        <source src="/download/{{ job.video }}" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>
<form method="post" enctype="multipart/form-data">
    <div class="mb-3">
        <label class="form-label">Subtitles (SRT)</label>
        <textarea name="srt_text" class="form-control" rows="10">{{ srt_content }}</textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">Overlay image (transparent PNG)</label>
        <input type="file" name="overlay" class="form-control" accept="image/*">
    </div>
    <div class="row mb-3">
        <div class="col">
            <label class="form-label">Overlay X offset</label>
            <input type="text" name="overlay_x" class="form-control" value="10">
        </div>
        <div class="col">
            <label class="form-label">Overlay Y offset</label>
            <input type="text" name="overlay_y" class="form-control" value="10">
        </div>
    </div>
    <button type="submit" class="btn btn-primary">Save changes</button>
</form>
{% endblock %}
